name: Daily Auto Shorts with Multi-Platform Upload

on:
  schedule:
    - cron: "30 15 * * *"     # 9:00 PM India time (3:30 PM UTC)
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install FFmpeg and Fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg fonts-noto-cjk fonts-noto-cjk-extra fonts-nanum
        sudo fc-cache -f -v

    - name: Cache Vosk Model
      uses: actions/cache@v3
      with:
        path: vosk-model-small-ko-0.22
        key: vosk-ko-model-${{ runner.os }}

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create .env file from secrets
      run: |
        cat > .env << EOF
        POLLINATIONS_API_KEY=${{ secrets.POLLINATIONS_API_KEY }}
        YT_CLIENT_ID=${{ secrets.YT_CLIENT_ID }}
        YT_CLIENT_SECRET=${{ secrets.YT_CLIENT_SECRET }}
        YT_REFRESH_TOKEN=${{ secrets.YT_REFRESH_TOKEN }}
        IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }}
        IG_USER_ID=${{ secrets.IG_USER_ID }}
        TIKTOK_ACCESS_TOKEN=${{ secrets.TIKTOK_ACCESS_TOKEN }}
        FB_ACCESS_TOKEN=${{ secrets.FB_ACCESS_TOKEN }}
        FB_PAGE_ID=${{ secrets.FB_PAGE_ID }}
        THREADS_ACCESS_TOKEN=${{ secrets.THREADS_ACCESS_TOKEN }}
        THREADS_USER_ID=${{ secrets.THREADS_USER_ID }}
        TWITTER_API_KEY=${{ secrets.TWITTER_API_KEY }}
        TWITTER_API_SECRET=${{ secrets.TWITTER_API_SECRET }}
        TWITTER_ACCESS_TOKEN=${{ secrets.TWITTER_ACCESS_TOKEN }}
        TWITTER_ACCESS_SECRET=${{ secrets.TWITTER_ACCESS_SECRET }}
        VK_ACCESS_TOKEN=${{ secrets.VK_ACCESS_TOKEN }}
        VK_GROUP_ID=${{ secrets.VK_GROUP_ID }}
        EOF

    - name: Check and generate topics if needed
      run: |
        python generate_topics.py

    - name: Generate daily short video
      run: |
        python main.py

    - name: Upload to all platforms (YouTube, Instagram, TikTok, Facebook, Threads, Twitter, VK)
      env:
        # YouTube
        YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
        YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        # Instagram (optional)
        IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        IG_USER_ID: ${{ secrets.IG_USER_ID }}
        # TikTok (optional)
        TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
        # Facebook (optional)
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        # Threads (optional)
        THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        # Twitter/X (optional)
        TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
        TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
        TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        # VK (optional)
        VK_ACCESS_TOKEN: ${{ secrets.VK_ACCESS_TOKEN }}
        VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
      run: |
        python upload_all_platforms.py
